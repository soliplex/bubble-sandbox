name: Python tests/coverage

on:
  push:
    branches:
      - main
    paths:
      - 'pyproject.toml'
      - 'src/bubble_sandbox/**'
      - 'tests/**'
      - '.github/workflows/python-test.yaml'
      - 'uv.lock'
  pull_request:
    branches:
      - main
    paths:
      - 'pyproject.toml'
      - 'src/bubble_sandbox/**'
      - 'tests/**'
      - '.github/workflows/python-test.yaml'
      - 'uv.lock'
  workflow_dispatch:

jobs:
  test-bubble-sandbox:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: true
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.12", "3.13", "3.14"]
        include:
            # Only run coverage on Python >= 3.13.
            - python-version: "3.12"
              pytest-args: "--no-cov"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
          cache-dependency-path: "**/pyproject.toml"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools
          pip install -e . --group dev

      - name: Setup 'bare' environment
        working-directory: "environments/bare"
        run: |
          python -m venv .venv
          .venv/bin/pip install --upgrade pip setuptools
          .venv/bin/pip install -e .

      - name: Setup 'pandas-only' environment
        working-directory: "environments/pandas-only"
        run: |
          python -m venv .venv
          .venv/bin/pip install --upgrade pip setuptools
          .venv/bin/pip install -e .

      - name: Run unit tests with coverage
        run: |
          pip list
          py.test -s ${{ matrix.pytest-args }}
